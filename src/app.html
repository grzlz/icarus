<!doctype html>
<html lang="es">
	<head>
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1" />
		<link rel="icon" href="/favicon.png" />
		<script>
			// Resolve theme before paint to avoid a flash. Order: explicit user
			// override in localStorage → system preference → light.
			(function () {
				try {
					var stored = localStorage.getItem('theme');
					var prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
					var dark = stored ? stored === 'dark' : prefersDark;
					if (dark) document.documentElement.classList.add('dark');
				} catch (e) {}
			})();
		</script>
		<script
			defer
			src="https://analytics.deploythebox.com/script.js"
			data-website-id="4220db2f-90c9-4921-aa47-ee4a1b07f336"
		></script>

		%sveltekit.head%
	</head>
	<body data-sveltekit-preload-data="hover">
		<div style="display: contents">%sveltekit.body%</div>
	</body>
</html>
